server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/thalassa
    username: thalassa
    password: changeme
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    # Garantiza que data.sql se ejecuta DESPUÉS de que Hibernate genere las tablas
    defer-datasource-initialization: true
  sql:
    init:
      # 'always' ejecuta data.sql en cada arranque (idempotente con ON CONFLICT DO NOTHING)
      mode: always

jwt:
  secret: thalassa-super-secret-key-change-this-in-production-0123456789abcdef
  expiration: 86400000

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://localhost:8001}

chat:
  free-daily-limit: 5
