server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets con hash (Vite genera nombres tipo main.abc123.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html
    # para que React Router maneje el enrutamiento en el cliente
    location / {
        try_files $uri $uri/ /index.html;
    }
}
